<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eisenhower</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    [contenteditable]:focus { outline: none; }
    .sortable-ghost { opacity: 0.3; }
    .sortable-drag { opacity: 0.9; cursor: grabbing; }
    .task-card { cursor: grab; }
    .task-card:active { cursor: grabbing; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Top bar -->
  <div class="sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3 flex gap-3 items-center shadow-sm">
    <input
      id="capture"
      type="text"
      placeholder="New task… add a date at the end: 2026-05-15"
      class="flex-1 px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 text-sm outline-none transition"
      autocomplete="off"
    />
    <div class="flex rounded-lg border border-gray-300 overflow-hidden text-sm font-medium">
      <button id="btn-matrix" onclick="setView('matrix')"
        class="px-4 py-2 bg-blue-600 text-white">Matrix</button>
      <button id="btn-list" onclick="setView('list')"
        class="px-4 py-2 bg-white text-gray-600 hover:bg-gray-50">List</button>
      <button id="btn-completed" onclick="setView('completed')"
        class="px-4 py-2 bg-white text-gray-600 hover:bg-gray-50">Completed</button>
    </div>
  </div>

  <!-- Matrix view -->
  <div id="view-matrix" class="p-4 flex gap-3" style="min-height: 80vh;">
    <!-- Inbox column on the left -->
    <div class="bg-white rounded-xl border border-gray-200 flex flex-col w-52 flex-shrink-0">
      <div class="px-4 pt-3 pb-1">
        <div class="text-xs font-bold uppercase tracking-wider text-gray-500">Inbox</div>
        <div class="text-xs text-gray-400">Unsorted</div>
      </div>
      <div id="q-inbox" data-quadrant="" class="task-zone flex-1 p-3 flex flex-col gap-2 min-h-14 overflow-y-auto"></div>
    </div>
    <!-- 2x2 matrix on the right -->
    <div class="flex-1 grid grid-cols-2 gap-3">
      <!-- DO FIRST -->
      <div class="bg-red-50 rounded-xl border border-red-200 flex flex-col">
        <div class="px-4 pt-3 pb-1">
          <div class="text-xs font-bold uppercase tracking-wider text-red-600">Do first</div>
          <div class="text-xs text-red-400">Urgent + Important</div>
        </div>
        <div id="q-do" data-quadrant="do" class="task-zone flex-1 p-3 flex flex-col gap-2 min-h-24"></div>
      </div>
      <!-- SCHEDULE -->
      <div class="bg-blue-50 rounded-xl border border-blue-200 flex flex-col">
        <div class="px-4 pt-3 pb-1">
          <div class="text-xs font-bold uppercase tracking-wider text-blue-600">Schedule</div>
          <div class="text-xs text-blue-400">Not Urgent + Important</div>
        </div>
        <div id="q-schedule" data-quadrant="schedule" class="task-zone flex-1 p-3 flex flex-col gap-2 min-h-24"></div>
      </div>
      <!-- DELEGATE -->
      <div class="bg-yellow-50 rounded-xl border border-yellow-200 flex flex-col">
        <div class="px-4 pt-3 pb-1">
          <div class="text-xs font-bold uppercase tracking-wider text-yellow-600">Delegate</div>
          <div class="text-xs text-yellow-400">Urgent + Not Important</div>
        </div>
        <div id="q-delegate" data-quadrant="delegate" class="task-zone flex-1 p-3 flex flex-col gap-2 min-h-24"></div>
      </div>
      <!-- ELIMINATE -->
      <div class="bg-gray-100 rounded-xl border border-gray-300 flex flex-col">
        <div class="px-4 pt-3 pb-1">
          <div class="text-xs font-bold uppercase tracking-wider text-gray-500">Eliminate</div>
          <div class="text-xs text-gray-400">Not Urgent + Not Important</div>
        </div>
        <div id="q-eliminate" data-quadrant="eliminate" class="task-zone flex-1 p-3 flex flex-col gap-2 min-h-24"></div>
      </div>
    </div>
  </div>

  <!-- Completed view -->
  <div id="view-completed" class="hidden p-4 max-w-3xl mx-auto">
    <div id="completed-container" class="bg-white rounded-xl border border-gray-200 overflow-hidden divide-y divide-gray-100"></div>
    <div id="completed-empty" class="hidden text-center text-gray-400 text-sm mt-12">No completed tasks yet.</div>
  </div>

  <!-- List view -->
  <div id="view-list" class="hidden p-4 max-w-3xl mx-auto">
    <div id="list-container" class="bg-white rounded-xl border border-gray-200 overflow-hidden divide-y divide-gray-100"></div>
    <div id="list-empty" class="hidden text-center text-gray-400 text-sm mt-12">No tasks yet — add one above.</div>
  </div>

  <script>
    const QUADRANT_COLORS = {
      do:       'bg-red-100 text-red-700',
      schedule: 'bg-blue-100 text-blue-700',
      delegate: 'bg-yellow-100 text-yellow-700',
      eliminate:'bg-gray-200 text-gray-600',
      '':       'bg-gray-100 text-gray-500',
    };
    const QUADRANT_LABELS = {
      do: 'Do first', schedule: 'Schedule', delegate: 'Delegate', eliminate: 'Eliminate', '': 'Inbox'
    };

    let tasks = [];
    let currentView = 'matrix';

    // --- API helpers ---
    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: body ? {'Content-Type': 'application/json'} : {},
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadTasks() {
      tasks = await api('GET', '/tasks');
      render();
    }

    // --- Capture ---
    const captureInput = document.getElementById('capture');
    captureInput.focus();

    captureInput.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      const val = captureInput.value.trim();
      if (!val) return;

      const dateRe = /^(\d{4}-\d{2}-\d{2})$/;
      const tokens = val.split(/\s+/);
      let text = val, due_date = null;

      if (tokens.length > 1 && dateRe.test(tokens[tokens.length - 1])) {
        due_date = tokens[tokens.length - 1];
        text = tokens.slice(0, -1).join(' ');
      }

      captureInput.value = '';
      const task = await api('POST', '/tasks', { text, due_date });
      tasks.push(task);
      render();
    });

    // --- Render ---
    function render() {
      if (currentView === 'matrix') renderMatrix();
      else if (currentView === 'list') renderList();
      else if (currentView === 'completed') renderCompleted();
    }

    function makeCard(task, forMatrix) {
      const div = document.createElement('div');
      div.className = 'task-card bg-white rounded-lg border border-gray-200 px-3 py-2 shadow-sm flex items-start gap-2 group select-none';
      div.dataset.id = task.id;

      const check = document.createElement('button');
      check.className = 'mt-0.5 w-4 h-4 rounded border border-gray-300 flex-shrink-0 hover:border-green-500 hover:bg-green-50 transition';
      check.title = 'Complete';
      check.addEventListener('click', async () => {
        await api('PATCH', `/tasks/${task.id}/complete`);
        tasks = tasks.filter(t => t.id !== task.id);
        render();
      });

      const body = document.createElement('div');
      body.className = 'flex-1 min-w-0';

      const textEl = document.createElement('div');
      textEl.className = 'text-sm text-gray-800 leading-snug break-words';
      textEl.textContent = task.text;
      textEl.contentEditable = true;
      textEl.addEventListener('blur', async () => {
        const newText = textEl.textContent.trim();
        if (newText && newText !== task.text) {
          await api('PATCH', `/tasks/${task.id}`, { text: newText });
          task.text = newText;
        } else {
          textEl.textContent = task.text;
        }
      });
      textEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); } });

      body.appendChild(textEl);

      if (task.due_date) {
        const dateEl = document.createElement('div');
        dateEl.className = 'text-xs text-gray-400 mt-0.5';
        dateEl.textContent = task.due_date;
        dateEl.contentEditable = true;
        dateEl.addEventListener('blur', async () => {
          const val = dateEl.textContent.trim();
          const valid = /^\d{4}-\d{2}-\d{2}$/.test(val);
          if (valid && val !== task.due_date) {
            await api('PATCH', `/tasks/${task.id}`, { due_date: val });
            task.due_date = val;
          } else {
            dateEl.textContent = task.due_date || '';
          }
        });
        dateEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); dateEl.blur(); } });
        body.appendChild(dateEl);
      }

      const del = document.createElement('button');
      del.className = 'opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition text-xs flex-shrink-0 leading-none mt-0.5';
      del.textContent = '✕';
      del.title = 'Delete';
      del.addEventListener('click', async () => {
        await api('DELETE', `/tasks/${task.id}`);
        tasks = tasks.filter(t => t.id !== task.id);
        render();
      });

      div.appendChild(check);
      div.appendChild(body);
      div.appendChild(del);
      return div;
    }

    function renderMatrix() {
      const zones = ['do', 'schedule', 'delegate', 'eliminate', ''];
      zones.forEach(q => {
        const zone = document.getElementById(q === '' ? 'q-inbox' : `q-${q}`);
        zone.innerHTML = '';
        tasks.filter(t => (t.quadrant ?? '') === q).forEach(t => zone.appendChild(makeCard(t, true)));
      });
    }

    function renderList() {
      const container = document.getElementById('list-container');
      const empty = document.getElementById('list-empty');
      container.innerHTML = '';

      if (tasks.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      container.classList.remove('hidden');
      empty.classList.add('hidden');

      // sort: dated first by date, then undated by created_at
      const sorted = [...tasks].sort((a, b) => {
        if (a.due_date && b.due_date) return a.due_date.localeCompare(b.due_date);
        if (a.due_date) return -1;
        if (b.due_date) return 1;
        return a.created_at.localeCompare(b.created_at);
      });

      sorted.forEach(task => {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-3 px-4 py-3 hover:bg-gray-50 group';

        const check = document.createElement('button');
        check.className = 'w-4 h-4 rounded border border-gray-300 flex-shrink-0 hover:border-green-500 hover:bg-green-50 transition';
        check.addEventListener('click', async () => {
          await api('PATCH', `/tasks/${task.id}/complete`);
          tasks = tasks.filter(t => t.id !== task.id);
          render();
        });

        const textEl = document.createElement('div');
        textEl.className = 'flex-1 text-sm text-gray-800';
        textEl.textContent = task.text;
        textEl.contentEditable = true;
        textEl.addEventListener('blur', async () => {
          const newText = textEl.textContent.trim();
          if (newText && newText !== task.text) {
            await api('PATCH', `/tasks/${task.id}`, { text: newText });
            task.text = newText;
          } else { textEl.textContent = task.text; }
        });
        textEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); } });

        const dateEl = document.createElement('div');
        dateEl.className = 'text-xs text-gray-400 w-24 text-right flex-shrink-0';
        dateEl.textContent = task.due_date || '—';
        dateEl.contentEditable = true;
        dateEl.addEventListener('blur', async () => {
          const val = dateEl.textContent.trim();
          if (val === '—' || val === '') {
            if (task.due_date) { await api('PATCH', `/tasks/${task.id}`, { due_date: '' }); task.due_date = null; }
            dateEl.textContent = '—';
          } else if (/^\d{4}-\d{2}-\d{2}$/.test(val) && val !== task.due_date) {
            await api('PATCH', `/tasks/${task.id}`, { due_date: val });
            task.due_date = val;
            render();
          } else { dateEl.textContent = task.due_date || '—'; }
        });
        dateEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); dateEl.blur(); } });

        const badge = document.createElement('span');
        const q = task.quadrant ?? '';
        badge.className = `text-xs px-2 py-0.5 rounded-full flex-shrink-0 ${QUADRANT_COLORS[q]}`;
        badge.textContent = QUADRANT_LABELS[q];

        const del = document.createElement('button');
        del.className = 'opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition text-xs flex-shrink-0';
        del.textContent = '✕';
        del.addEventListener('click', async () => {
          await api('DELETE', `/tasks/${task.id}`);
          tasks = tasks.filter(t => t.id !== task.id);
          render();
        });

        row.append(check, textEl, dateEl, badge, del);
        container.appendChild(row);
      });
    }

    async function renderCompleted() {
      const container = document.getElementById('completed-container');
      const empty = document.getElementById('completed-empty');
      container.innerHTML = '';

      const completed = await api('GET', '/tasks/completed');

      if (completed.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      container.classList.remove('hidden');
      empty.classList.add('hidden');

      completed.forEach(task => {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-3 px-4 py-3 hover:bg-gray-50 group';

        const check = document.createElement('button');
        check.className = 'w-4 h-4 rounded border border-green-400 bg-green-100 flex-shrink-0 hover:bg-white hover:border-gray-300 transition flex items-center justify-center';
        check.title = 'Mark incomplete';
        check.innerHTML = '<svg class="w-3 h-3 text-green-600" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        check.addEventListener('click', async () => {
          await api('PATCH', `/tasks/${task.id}/uncomplete`);
          tasks.push({ ...task, completed: 0 });
          row.remove();
          if (!container.children.length) {
            container.classList.add('hidden');
            empty.classList.remove('hidden');
          }
          if (currentView !== 'completed') render();
        });

        const textEl = document.createElement('div');
        textEl.className = 'flex-1 text-sm text-gray-400 line-through';
        textEl.textContent = task.text;

        const dateEl = document.createElement('div');
        dateEl.className = 'text-xs text-gray-300 w-24 text-right flex-shrink-0';
        dateEl.textContent = task.due_date || '—';

        const badge = document.createElement('span');
        const q = task.quadrant ?? '';
        badge.className = `text-xs px-2 py-0.5 rounded-full flex-shrink-0 ${QUADRANT_COLORS[q]} opacity-50`;
        badge.textContent = QUADRANT_LABELS[q];

        const del = document.createElement('button');
        del.className = 'opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition text-xs flex-shrink-0';
        del.textContent = '✕';
        del.title = 'Delete';
        del.addEventListener('click', async () => {
          await api('DELETE', `/tasks/${task.id}`);
          row.remove();
          if (!container.children.length) {
            container.classList.add('hidden');
            empty.classList.remove('hidden');
          }
        });

        row.append(check, textEl, dateEl, badge, del);
        container.appendChild(row);
      });
    }

    // --- Drag and drop ---
    function initSortable() {
      const zones = document.querySelectorAll('.task-zone');
      zones.forEach(zone => {
        Sortable.create(zone, {
          group: 'tasks',
          animation: 150,
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          onEnd(evt) {
            const taskId = parseInt(evt.item.dataset.id);
            const newQuadrant = evt.to.dataset.quadrant ?? '';
            api('PATCH', `/tasks/${taskId}`, { quadrant: newQuadrant });
            const task = tasks.find(t => t.id === taskId);
            if (task) task.quadrant = newQuadrant || null;
          }
        });
      });
    }

    // --- View toggle ---
    function setView(v) {
      currentView = v;
      document.getElementById('view-matrix').classList.toggle('hidden', v !== 'matrix');
      document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
      document.getElementById('view-completed').classList.toggle('hidden', v !== 'completed');
      document.getElementById('btn-matrix').className   = `px-4 py-2 ${v === 'matrix'    ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`;
      document.getElementById('btn-list').className     = `px-4 py-2 ${v === 'list'      ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`;
      document.getElementById('btn-completed').className = `px-4 py-2 ${v === 'completed' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`;
      render();
    }

    // --- Init ---
    initSortable();
    loadTasks();
  </script>
</body>
</html>
